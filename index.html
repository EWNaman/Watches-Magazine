<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login with Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="container">
        <h2>Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email: </label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password: </label>
                <input type="password" id="password" required>
                <span id="eye" class="eye-icon">&#128065;</span> <!-- Eye icon to toggle password visibility -->
            </div>
            <button type="submit">Login</button>
        </form>

        <div id="error-message" class="error-message"></div>
    </div>

    <script src="auth.js"></script>

    <script>
        // Toggle password visibility when clicking on the eye icon
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye');
        
        eyeIcon.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';  // Toggle between password and text
            passwordInput.type = type;
        });
    </script>

</body>
</html>
